<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Chronicles of Grim Greaser — Tiny Undertale-like Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="title">
      <h1>THE CHRONICLES OF GRIM GREASER</h1>
      <p class="sub">A small Undertale / Deltarune inspired browser demo — Grim, Zoey, Zack & Mia</p>
    </header>

    <main>
      <div id="game-root">
        <canvas id="game-canvas" width="960" height="540"></canvas>

        <div id="ui">
          <div id="dialogue-box" class="panel hidden">
            <p id="dialogue-text"></p>
            <div id="dialogue-controls">
              <button id="next-btn" class="btn">▶ Next</button>
            </div>
          </div>

          <div id="battle-ui" class="panel hidden">
            <div id="battle-info">
              <div class="entity">
                <div class="name" id="enemy-name">ENEMY</div>
                <div class="hpbar">
                  <div id="enemy-hp" class="hp-fill"></div>
                </div>
              </div>

              <div class="entity">
                <div class="name">GRIM</div>
                <div class="hpbar">
                  <div id="player-hp" class="hp-fill"></div>
                </div>
              </div>
            </div>

            <div id="action-menu" class="menu grid-2">
              <button class="btn action" data-action="fight">FIGHT</button>
              <button class="btn action" data-action="act">ACT</button>
              <button class="btn action" data-action="item">ITEM</button>
              <button class="btn action" data-action="mercy">MERCY</button>
            </div>

            <div id="combat-log" class="panel mini hidden"></div>

            <!-- ACT / ITEM submenus populated by game.js -->
            <div id="menu-sub" style="margin-top:10px;display:flex;gap:8px;">
              <div id="acts-container" style="flex:1">
                <div class="panel" style="padding:8px">
                  <div id="menu-info" style="margin-bottom:6px;color:#333;font-size:12px"></div>
                  <div id="acts-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
                </div>
              </div>
              <div id="items-container" style="width:220px">
                <div class="panel" style="padding:8px">
                  <div style="font-weight:700;margin-bottom:6px;font-family:'Press Start 2P',monospace">ITEMS</div>
                  <div id="items-list" style="display:flex;flex-direction:column;gap:6px"></div>
                </div>
              </div>
            </div>
          </div>

          <div id="hud" class="panel">
            <div style="display:flex;align-items:center;gap:12px">
              <div id="state-label">MENU</div>
              <div id="save-indicator" style="color:var(--muted);font-size:12px;display:none">Saved</div>
            </div>
            <div id="controls-hint">Use mouse / tap to interact — Arrow keys to dodge during attacks</div>
          </div>
        </div>
      </div>

      <section id="credits">
        <small>Based on the story by Shayden Sloan — adapted by this tiny demo</small>
      </section>
    </main>

    <footer>
      <button id="start-game" class="btn primary">Start</button>
      <button id="reset-game" class="btn">Reset</button>
      <button id="save-game" class="btn">Save</button>
      <button id="load-game" class="btn">Load</button>
      <div id="debug-panel" style="display:flex;gap:6px;align-items:center;margin-left:12px">
        <button id="dbg-enc-0" class="btn">Jump Lib</button>
        <button id="dbg-enc-1" class="btn">Jump Shadow</button>
        <button id="dbg-enc-2" class="btn">Jump Mia</button>
        <button id="dbg-heal" class="btn">Heal</button>
        <button id="dbg-add-item" class="btn">Give Snack</button>
      </div>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
